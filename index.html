<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Potato Fan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a1f0e;
    font-family: 'Georgia', serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: fixed; width: 100%; height: 100%;
  }
  canvas { display: block; touch-action: none; }

  /* ── HUD ── */
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: env(safe-area-inset-top, 12px) 14px 0;
    padding-top: max(env(safe-area-inset-top), 12px);
    pointer-events: none; z-index: 10;
  }
  .score-block {
    background: rgba(30,20,5,0.82);
    border: 1.5px solid rgba(180,140,60,0.5);
    border-radius: 10px; padding: 7px 14px; text-align: center;
    backdrop-filter: blur(4px);
  }
  .score-label { font-size: 9px; color: #a08840; letter-spacing: 2px; text-transform: uppercase; }
  .score-value { font-size: 24px; font-weight: bold; color: #f0c840; line-height: 1.1; }
  #ammo-block { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
  .ammo-row { display: flex; gap: 3px; }
  .ammo-pip { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(180,140,60,0.4); }
  .pip-potato { background: #c8841a; }
  .pip-tomato { background: #c0392b; }
  .pip-used { background: transparent; border-color: rgba(180,140,60,0.15); }

  /* ── THROW ZONE UI ── */
  #hint {
    position: fixed; bottom: 22px; left: 0; right: 0; text-align: center;
    color: rgba(220,190,100,0.9); font-size: 13px; letter-spacing: 1.5px;
    pointer-events: none; z-index: 10; transition: opacity 0.8s;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  #item-select {
    position: fixed; bottom: 58px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 20px; z-index: 10;
  }
  .item-btn {
    background: rgba(30,20,5,0.85); border: 2px solid rgba(180,140,60,0.35);
    border-radius: 50%; width: 56px; height: 56px; font-size: 28px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, transform 0.1s;
    backdrop-filter: blur(4px);
    -webkit-tap-highlight-color: transparent;
  }
  .item-btn.active { border-color: #f0c840; transform: scale(1.12); }
  .item-btn.empty { opacity: 0.28; pointer-events: none; }

  #fan-dial-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  #fan-dial {
    width: 56px; height: 56px; cursor: pointer; touch-action: none;
    border-radius: 50%;
  }
  #fan-dial-label {
    font-size: 9px; color: rgba(220,190,100,0.75); letter-spacing: 2px;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(15,10,3,0.93);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px 20px;
    padding-top: max(env(safe-area-inset-top), 24px);
    padding-bottom: max(env(safe-area-inset-bottom), 24px);
  }

  /* Card container — centers everything nicely on all screen sizes */
  .overlay-card {
    background: rgba(30,22,8,0.96);
    border: 1.5px solid rgba(160,120,50,0.45);
    border-radius: 18px;
    padding: 32px 28px 28px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  #overlay h1 {
    font-size: clamp(32px, 10vw, 46px);
    color: #f0c840;
    text-shadow: 0 2px 14px rgba(240,150,0,0.5);
    letter-spacing: -0.5px; margin-bottom: 2px;
    text-align: center;
  }
  #overlay .subtitle {
    color: #a08840; font-size: 12px; letter-spacing: 3px;
    margin-bottom: 28px; text-align: center;
  }

  .btn {
    background: linear-gradient(180deg, #a04818 0%, #7a3210 100%);
    color: #f8e080; border: 1.5px solid #c06030;
    border-radius: 10px; font-family: 'Georgia', serif;
    font-size: clamp(15px, 4.5vw, 18px);
    padding: 15px 0; cursor: pointer; letter-spacing: 1px;
    margin: 5px 0; width: 100%; max-width: 280px;
    transition: filter 0.12s; -webkit-tap-highlight-color: transparent;
    text-align: center;
  }
  .btn:active { filter: brightness(1.2); }
  .btn-secondary {
    background: transparent; color: #a08840;
    border-color: rgba(160,120,50,0.35); font-size: clamp(13px, 4vw, 15px);
    padding: 11px 0;
  }

  /* Leaderboard */
  #leaderboard-screen { display: none; width: 100%; }
  #leaderboard-screen h2 { color: #f0c840; font-size: 20px; text-align: center; margin-bottom: 14px; }
  .lb-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 10px; border-bottom: 1px solid rgba(160,120,50,0.15);
    color: #c8a050; font-size: 14px;
  }
  .lb-row:first-child { border-top: 1px solid rgba(160,120,50,0.15); }
  .lb-rank { width: 28px; font-size: 16px; }
  .lb-name { flex: 1; padding: 0 6px; }
  .lb-pts { color: #f0c840; font-weight: bold; }
  .lb-empty { text-align: center; color: #806830; padding: 24px; font-size: 13px; }

  /* Name entry */
  #name-screen { display: none; text-align: center; width: 100%; }
  #name-screen p { color: #c8a050; font-size: 15px; margin-bottom: 4px; }
  #name-screen .final-score { font-size: clamp(28px, 9vw, 38px); color: #f0c840; font-weight: bold; margin: 10px 0 4px; }
  #name-input {
    background: rgba(15,10,3,0.8); border: 1.5px solid rgba(180,140,60,0.5);
    border-radius: 10px; color: #f0c840; font-family: 'Georgia', serif;
    font-size: 18px; padding: 13px 16px; width: 100%; max-width: 280px;
    text-align: center; margin: 12px 0 8px; outline: none;
    -webkit-appearance: none;
  }
  #name-input::placeholder { color: #706030; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="score-block">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div id="ammo-block"></div>
</div>
<div id="hint">Swipe up to throw</div>
<div id="item-select">
  <div class="item-btn active" id="btn-potato">🥔</div>
  <div class="item-btn" id="btn-tomato">🍅</div>
  <div id="fan-dial-wrap">
    <canvas id="fan-dial" width="56" height="56"></canvas>
    <div id="fan-dial-label">FAN</div>
  </div>
</div>
<div id="overlay">
  <div class="overlay-card">
  <div id="main-screen">
    <h1>🥔 Potato Fan</h1>
    <div class="subtitle">KITCHEN CARNAGE</div>
    <button class="btn" onclick="startGame()">PLAY</button>
    <button class="btn btn-secondary" onclick="showLeaderboard()">LEADERBOARD</button>
  </div>
  <div id="leaderboard-screen">
    <h2>🏆 Leaderboard</h2>
    <div id="lb-list"></div>
    <button class="btn btn-secondary" style="margin-top:16px;" onclick="showMain()">← BACK</button>
  </div>
  <div id="name-screen">
    <p>Round over!</p>
    <div class="final-score" id="final-score-display">0 pts</div>
    <p style="color:#806830;font-size:12px;margin-top:4px;">Enter your name</p>
    <input id="name-input" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
    <button class="btn" onclick="saveScore()">SAVE SCORE</button>
    <button class="btn btn-secondary" onclick="skipSave()">SKIP</button>
  </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── FAN SPEED DIAL ───────────────────────────────────────────────
const dialCanvas = document.getElementById('fan-dial');
const dialCtx = dialCanvas.getContext('2d');
let fanSpeedTarget = 0.035; // base idle speed
let dialAngle = -Math.PI * 0.75; // knob position (maps min→max)
const DIAL_MIN = 0.015;
const DIAL_MAX = 0.12;
const DIAL_ANGLE_MIN = -Math.PI * 0.8;
const DIAL_ANGLE_MAX = Math.PI * 0.8;

function dialAngleToSpeed(a) {
  const t = (a - DIAL_ANGLE_MIN) / (DIAL_ANGLE_MAX - DIAL_ANGLE_MIN);
  return DIAL_MIN + t * (DIAL_MAX - DIAL_MIN);
}

function drawDial() {
  const dc = dialCtx;
  const W2 = 56, H2 = 56, cx = 28, cy = 28, r = 24;
  dc.clearRect(0, 0, W2, H2);

  // Outer ring
  const ringG = dc.createRadialGradient(cx-4, cy-4, 4, cx, cy, r);
  ringG.addColorStop(0, '#5a4020'); ringG.addColorStop(1, '#2a1808');
  dc.fillStyle = ringG;
  dc.beginPath(); dc.arc(cx, cy, r, 0, Math.PI*2); dc.fill();

  // Tick marks
  dc.strokeStyle = 'rgba(200,160,60,0.4)'; dc.lineWidth = 1.5;
  for (let i = 0; i <= 8; i++) {
    const a = DIAL_ANGLE_MIN + (i/8)*(DIAL_ANGLE_MAX - DIAL_ANGLE_MIN);
    const inner = i % 4 === 0 ? r*0.62 : r*0.72;
    dc.beginPath();
    dc.moveTo(cx + Math.cos(a)*inner, cy + Math.sin(a)*inner);
    dc.lineTo(cx + Math.cos(a)*(r-3), cy + Math.sin(a)*(r-3));
    dc.stroke();
  }

  // Arc showing current value
  dc.strokeStyle = '#f0c840'; dc.lineWidth = 2.5;
  dc.beginPath();
  dc.arc(cx, cy, r*0.82, DIAL_ANGLE_MIN, dialAngle);
  dc.stroke();

  // Knob face
  const knobG = dc.createRadialGradient(cx-3, cy-3, 2, cx, cy, r*0.55);
  knobG.addColorStop(0, '#c8a040'); knobG.addColorStop(1, '#6a4010');
  dc.fillStyle = knobG;
  dc.beginPath(); dc.arc(cx, cy, r*0.52, 0, Math.PI*2); dc.fill();

  // Pointer line
  dc.strokeStyle = '#f0f0e0'; dc.lineWidth = 2.5; dc.lineCap = 'round';
  dc.beginPath();
  dc.moveTo(cx + Math.cos(dialAngle)*r*0.15, cy + Math.sin(dialAngle)*r*0.15);
  dc.lineTo(cx + Math.cos(dialAngle)*r*0.44, cy + Math.sin(dialAngle)*r*0.44);
  dc.stroke();

  // Center dot
  dc.fillStyle = '#2a1808';
  dc.beginPath(); dc.arc(cx, cy, 3, 0, Math.PI*2); dc.fill();
}

// Dial interaction — drag to rotate
let dialDragging = false, dialStartY = 0, dialStartAngle = 0;

function dialPointerStart(e) {
  e.preventDefault(); e.stopPropagation();
  dialDragging = true;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  dialStartY = clientY; dialStartAngle = dialAngle;
  unlockAudio();
}
function dialPointerMove(e) {
  if (!dialDragging) return;
  e.preventDefault();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const dy = dialStartY - clientY; // drag up = increase
  const range = DIAL_ANGLE_MAX - DIAL_ANGLE_MIN;
  dialAngle = Math.max(DIAL_ANGLE_MIN, Math.min(DIAL_ANGLE_MAX, dialStartAngle + dy * 0.03));
  fanSpeedTarget = dialAngleToSpeed(dialAngle);
  drawDial();
}
function dialPointerEnd(e) { dialDragging = false; }

dialCanvas.addEventListener('touchstart', dialPointerStart, { passive: false });
dialCanvas.addEventListener('touchmove', dialPointerMove, { passive: false });
dialCanvas.addEventListener('touchend', dialPointerEnd);
dialCanvas.addEventListener('mousedown', dialPointerStart);
window.addEventListener('mousemove', dialPointerMove);
window.addEventListener('mouseup', dialPointerEnd);

drawDial();
const POTATO_CALLS = [
  'Poh... tay... TOE!!!',
  'Yoos guys!',
  'Kom... BOOO... cha!!!',
  'WHOOOOLE Hooooog!!',
  'FLAAAP Baaack!!',
  'Deeental Plaaaan!!',
  'FELLLLLLAS!!!',
  'SCCHHEMICK!!!',
  'Rennnnnnzo!!',
  'POTATO FAAAAN!!!',
  'Good... HEAVENS!!!',
  'Somebody stop me!!!',
  'Oh CANAAAAADA!!!',
];
let lastCallIndex = -1;
let milestoneSpoken = false;
let cachedVoices = [];
let accentIndex = 0;

const ACCENT_POOLS = [
  // British — posh and slow
  { hints:['Daniel','Arthur','en-GB'],      rate:[0.72,0.82], pitch:[0.60,0.75] },
  // Australian — fast and bright
  { hints:['Karen','Matilda','en-AU'],       rate:[1.30,1.50], pitch:[1.30,1.60] },
  // Canadian redneck — slow drawl, very nasal, low
  { hints:['en-CA','Samantha','Nathan'],     rate:[0.60,0.72], pitch:[0.50,0.65] },
  // Canadian redneck 2 — faster but still nasal
  { hints:['en-CA','Nathan','Samantha'],     rate:[0.75,0.88], pitch:[0.55,0.70] },
  // Irish — lilting and high
  { hints:['Moira','Fiona','en-IE'],         rate:[1.10,1.30], pitch:[1.40,1.70] },
  // Indian — melodic, fast
  { hints:['Rishi','en-IN','Veena'],         rate:[1.20,1.40], pitch:[1.20,1.50] },
  // East Asian — very fast, very high
  { hints:['Kyoko','Ava','en-US'],           rate:[1.50,1.80], pitch:[1.60,2.00] },
  // Deep redneck / country — extremely slow, very low
  { hints:['Fred','en-US','Tom','Alex'],     rate:[0.50,0.65], pitch:[0.40,0.55] },
  // Scottish — gruff and medium
  { hints:['Fiona','en-GB'],                 rate:[0.80,0.95], pitch:[0.70,0.85] },
  // Hyper excited — any voice cranked way up
  { hints:['en-US','Samantha','Alex'],       rate:[1.60,1.90], pitch:[1.70,2.00] },
];

function rnd(a, b) { return a + Math.random() * (b - a); }

function loadVoices() {
  if (!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices();
  if (voices.length) cachedVoices = voices;
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  setTimeout(loadVoices, 100);
  setTimeout(loadVoices, 800);
}

function pickVoice(hints) {
  loadVoices();
  for (const hint of hints) {
    const found = cachedVoices.find(v => new RegExp(hint, 'i').test(v.name + ' ' + (v.lang||'')));
    if (found) return found;
  }
  return cachedVoices.find(v => /en/i.test(v.lang)) || cachedVoices[0] || null;
}

function speak(text, accentHints) {
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    let hints, rate, pitch;
    if (accentHints) {
      // Direct hints passed in (e.g. stewed tomatoes — use British)
      hints = accentHints;
      rate  = [0.72, 0.82]; pitch = [0.60, 0.75];
    } else {
      const pool = ACCENT_POOLS[accentIndex % ACCENT_POOLS.length];
      hints = pool.hints;
      rate  = pool.rate;
      pitch = pool.pitch;
    }
    utt.rate   = rnd(rate[0],  rate[1]);
    utt.pitch  = rnd(pitch[0], pitch[1]);
    utt.volume = 1.0;
    const voice = pickVoice(hints);
    if (voice) utt.voice = voice;
    setTimeout(() => { try { window.speechSynthesis.speak(utt); } catch(e) {} }, 60);
  } catch(e) {}
}



function speakPotatoCall() {
  let idx;
  do { idx = Math.floor(Math.random() * POTATO_CALLS.length); }
  while (idx === lastCallIndex && POTATO_CALLS.length > 1);
  lastCallIndex = idx;
  accentIndex++;
  speak(POTATO_CALLS[idx]);
}
let audioCtx = null;
let audioUnlocked = false;

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    const ac = getAudio();
    if (!ac) return;
    const buf = ac.createBuffer(1, 1, 22050);
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(0);
    ac.resume().then(() => { audioUnlocked = true; });
  } catch(e) {}
  // Load voices now that we have a user gesture
  loadVoices();
  setTimeout(loadVoices, 300);
}

function playThud(x) {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    const buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ac.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 18) * 0.9
               + Math.sin(2 * Math.PI * 80 * t) * Math.exp(-t * 12) * 0.5;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.6, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    // Pan based on x position
    const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;
    if (pan) { pan.pan.value = Math.max(-1, Math.min(1, (x / W) * 2 - 1)); src.connect(pan); pan.connect(gain); }
    else src.connect(gain);
    gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

function playCrash(x) {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    const dur = 0.4;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ac.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 8) * 0.85
               + Math.sin(2 * Math.PI * 200 * t) * Math.exp(-t * 15) * 0.3
               + Math.sin(2 * Math.PI * 350 * t) * Math.exp(-t * 20) * 0.2;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.8, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;
    if (pan) { pan.pan.value = Math.max(-1, Math.min(1, (x / W) * 2 - 1)); src.connect(pan); pan.connect(gain); }
    else src.connect(gain);
    gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

function playGlass(x) {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    // High-freq shards + low crack
    for (let layer = 0; layer < 3; layer++) {
      const dur = 0.6 + layer * 0.2;
      const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
      const data = buf.getChannelData(0);
      const baseFreq = [1200, 2400, 3800][layer];
      for (let i = 0; i < data.length; i++) {
        const t = i / ac.sampleRate;
        data[i] = Math.sin(2 * Math.PI * baseFreq * t * (1 - t * 0.3))
                  * (Math.random() * 0.4 + 0.6)
                  * Math.exp(-t * (10 + layer * 4)) * 0.4;
        if (i % 3 === 0) data[i] += (Math.random() * 2 - 1) * Math.exp(-t * 6) * 0.15;
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.5 - layer * 0.1, ac.currentTime + layer * 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur + layer * 0.03);
      const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;
      if (pan) { pan.pan.value = Math.max(-1, Math.min(1, (x / W) * 2 - 1)); src.connect(pan); pan.connect(gain); }
      else src.connect(gain);
      gain.connect(ac.destination);
      src.start(ac.currentTime + layer * 0.03);
    }
  } catch(e) {}
}

function playFanHit() {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    // Metallic clang + wood thwack
    const dur = 0.5;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ac.sampleRate;
      data[i] = Math.sin(2 * Math.PI * 420 * t) * Math.exp(-t * 10) * 0.6
               + Math.sin(2 * Math.PI * 840 * t) * Math.exp(-t * 14) * 0.3
               + (Math.random() * 2 - 1) * Math.exp(-t * 25) * 0.4;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.7, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

function playMetalBang(x) {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    const dur = 0.35;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ac.sampleRate;
      data[i] = Math.sin(2 * Math.PI * 180 * t) * Math.exp(-t * 12) * 0.7
               + Math.sin(2 * Math.PI * 360 * t) * Math.exp(-t * 18) * 0.3
               + (Math.random() * 2 - 1) * Math.exp(-t * 30) * 0.5;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.75, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;
    if (pan) { pan.pan.value = Math.max(-1, Math.min(1, (x / W) * 2 - 1)); src.connect(pan); pan.connect(gain); }
    else src.connect(gain);
    gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

function playTomatoSplat(x) {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    const dur = 0.3;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ac.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 20) * 0.5
               + Math.sin(2 * Math.PI * 60 * t) * Math.exp(-t * 8) * 0.4;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.6, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;
    if (pan) { pan.pan.value = Math.max(-1, Math.min(1, (x / W) * 2 - 1)); src.connect(pan); pan.connect(gain); }
    else src.connect(gain);
    gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

function playFloorBounce(x) {
  try {
    const ac = getAudio(); if (!ac || ac.state === 'suspended') return;
    const dur = 0.15;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ac.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 40) * 0.4
               + Math.sin(2 * Math.PI * 100 * t) * Math.exp(-t * 25) * 0.3;
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.3, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    gain.connect(ac.destination);
    src.start();
  } catch(e) {}
}

// ─── PHYSICS ITEMS ────────────────────────────────────────────────
function knockItem(item, impactVx, impactVy) {
  if (item.phys) return;
  // Bias strongly sideways — objects should slide and fall, not just pop up
  const sideDir = impactVx >= 0 ? 1 : -1;
  const sidewaysBoost = (3 + Math.random() * 5) * sideDir;
  item.phys = {
    px: item.x * W + (item.w * W) / 2,
    py: item.y * H + (item.h * H) / 2,
    vx: impactVx * (1.0 + Math.random() * 0.6) + sidewaysBoost,
    vy: (Math.random() * 1 - 1.5), // flat to slightly downward — slides off counter
    angle: 0,
    spin: sideDir * (0.2 + Math.random() * 0.35),
    w: item.w * W,
    h: item.h * H,
    bounces: 0,
    settled: false
  };
}

// Cabinet hit zone — left side of screen, wall area
const CABINET_ZONE = { x: 0, y: 0.08, w: 0.30, h: 0.50 };
let cabinetDamages = []; // persistent scuffs/dents on cabinets

function hitCabinet(px, py, isTomato) {
  // Add a damage mark to the cabinet
  cabinetDamages.push({ x: px, y: py, r: 6 + Math.random()*10, isTomato, angle: Math.random()*Math.PI*2 });
  const pts = isTomato ? 18 : 6;
  score += pts;
  updateScoreDisplay();
  spawnFloatingText('+' + pts + (isTomato ? ' 🍅' : ''), px, py, isTomato ? '#e74c3c' : '#f0c060');
  spawnHit(px, py, isTomato);
  addKitchenDamage(px, py, isTomato);
  if (isTomato) playTomatoSplat(px); else playCrash(px);
}

function drawCabinetDamage() {
  for (const d of cabinetDamages) {
    ctx.save();
    ctx.globalAlpha = 0.75;
    if (d.isTomato) {
      ctx.fillStyle = '#7a1010';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2, r = d.r*(0.6+Math.random()*0.4);
        i === 0 ? ctx.moveTo(d.x+Math.cos(a)*r, d.y+Math.sin(a)*r)
                : ctx.lineTo(d.x+Math.cos(a)*r, d.y+Math.sin(a)*r);
      }
      ctx.closePath(); ctx.fill();
    } else {
      ctx.strokeStyle = '#2a1000'; ctx.lineWidth = 1.5;
      ctx.translate(d.x, d.y); ctx.rotate(d.angle);
      for (let i = 0; i < 5; i++) {
        const a = d.angle + i * Math.PI/2.5;
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.lineTo(Math.cos(a)*d.r*1.3, Math.sin(a)*d.r*1.3);
        ctx.stroke();
      }
      ctx.fillStyle = '#3a1800';
      ctx.beginPath(); ctx.arc(0, 0, d.r*0.4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function updatePhysicsItems() {
  const floorY = H * 0.75;
  for (let item of kitchenItems) {
    const ph = item.phys;
    if (!ph || ph.settled) continue;

    ph.vx *= 0.985;
    ph.vy += 0.35; // gravity
    ph.px += ph.vx;
    ph.py += ph.vy;
    ph.angle += ph.spin;
    ph.spin *= 0.96;

    // Floor collision
    if (ph.py + ph.h / 2 >= floorY) {
      ph.py = floorY - ph.h / 2;
      ph.vy *= -0.45;
      ph.vx *= 0.82;
      ph.spin *= 0.6;
      ph.bounces++;
      if (Math.abs(ph.vy) > 2.5) {
        if (item.sound === 'metal') playMetalBang(ph.px);
        else if (item.sound === 'crash' && ph.bounces === 1) playCrash(ph.px);
        else playFloorBounce(ph.px);
      } else if (Math.abs(ph.vy) > 1.0) {
        playFloorBounce(ph.px);
      }
      if (Math.abs(ph.vy) < 0.8 && Math.abs(ph.vx) < 0.5) {
        ph.vy = 0; ph.vx *= 0.3; ph.spin *= 0.1;
        if (Math.abs(ph.spin) < 0.005) { ph.spin = 0; ph.settled = true; }
      }
    }
    // Wall collisions
    if (ph.px - ph.w/2 < 0) { ph.px = ph.w/2; ph.vx = Math.abs(ph.vx) * 0.5; }
    if (ph.px + ph.w/2 > W) { ph.px = W - ph.w/2; ph.vx = -Math.abs(ph.vx) * 0.5; }
  }
}

// ─── GLASS SHARDS ─────────────────────────────────────────────────
function smashWindow(ix, iy) {
  if (WIN.broken) return;
  WIN.broken = true;
  playGlass(WIN.x + WIN.w / 2);
  // Spawn many glass shards
  for (let i = 0; i < 22; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 6;
    glassShards.push({
      x: WIN.x + Math.random() * WIN.w,
      y: WIN.y + Math.random() * WIN.h,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.25,
      size: 4 + Math.random() * 14,
      life: 1,
      alpha: 0.7 + Math.random() * 0.3
    });
  }
}

function updateGlassShards() {
  const floorY = H * 0.75;
  for (let s of glassShards) {
    s.vx *= 0.97;
    s.vy += 0.2;
    s.x += s.vx;
    s.y += s.vy;
    s.angle += s.spin;
    s.spin *= 0.97;
    if (s.y > floorY) { s.y = floorY; s.vy *= -0.25; s.vx *= 0.7; }
    s.life -= 0.004;
  }
  glassShards = glassShards.filter(s => s.life > 0);
}

function drawGlassShards() {
  for (let s of glassShards) {
    ctx.save();
    ctx.globalAlpha = s.life * s.alpha;
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.fillStyle = 'rgba(180,220,255,0.7)';
    ctx.strokeStyle = 'rgba(220,240,255,0.9)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    // Irregular triangle shard
    ctx.moveTo(0, -s.size / 2);
    ctx.lineTo(s.size * 0.4, s.size * 0.3);
    ctx.lineTo(-s.size * 0.45, s.size * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

// ─── DRAWING ──────────────────────────────────────────────────────

// Perspective helpers — single vanishing point centre-top
const VP = { x: 0.5, y: 0.38 }; // as fraction of W/H

function vpX() { return VP.x * W; }
function vpY() { return VP.y * H; }

// Draw a quadrilateral face
function quad(x1,y1,x2,y2,x3,y3,x4,y4, fillStyle) {
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4);
  ctx.closePath();
  ctx.fillStyle = fillStyle; ctx.fill();
}

function drawKitchen() {
  const vx = vpX(), vy = vpY();
  const horizon = H * 0.67;

  // ── CEILING — off-white popcorn texture ──────────────────────────
  const ceilG = ctx.createLinearGradient(0, 0, 0, horizon * 0.32);
  ceilG.addColorStop(0, '#e8e0d0');
  ceilG.addColorStop(1, '#d8d0bc');
  ctx.fillStyle = ceilG;
  ctx.fillRect(0, 0, W, horizon * 0.32);
  // Subtle stipple texture
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let i = 0; i < 80; i++) {
    ctx.fillRect(Math.sin(i*137.5)*W*0.5+W*0.5, Math.cos(i*97.3)*horizon*0.16+horizon*0.16, 2, 1);
  }

  // ── BACK WALL — warm cream/beige 90s wall ────────────────────────
  const wallG = ctx.createLinearGradient(0, horizon*0.28, 0, horizon);
  wallG.addColorStop(0,   '#e8dcc8');
  wallG.addColorStop(0.6, '#ddd0b8');
  wallG.addColorStop(1,   '#ccc0a0');
  ctx.fillStyle = wallG;
  ctx.fillRect(0, horizon * 0.28, W, horizon * 0.74);

  // ── FLORAL WALLPAPER BORDER (classic 90s!) ───────────────────────
  const borderY = horizon * 0.34;
  const borderH = H * 0.055;
  // Border background — dusty mauve/rose
  ctx.fillStyle = '#c8a898';
  ctx.fillRect(0, borderY, W, borderH);
  // Repeating floral pattern
  ctx.save();
  const flowerSpacing = W * 0.09;
  for (let fx = flowerSpacing * 0.5; fx < W; fx += flowerSpacing) {
    const fy = borderY + borderH * 0.5;
    // Stem
    ctx.strokeStyle = '#5a7a3a'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(fx, fy+borderH*0.3); ctx.lineTo(fx, fy-borderH*0.1); ctx.stroke();
    // Leaves
    ctx.fillStyle = '#6a8a44';
    ctx.beginPath(); ctx.ellipse(fx-6, fy+borderH*0.1, 5, 2.5, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(fx+6, fy, 5, 2.5, 0.5, 0, Math.PI*2); ctx.fill();
    // Petals
    const petalColors = ['#e07880','#d06070','#c85870'];
    for (let p = 0; p < 5; p++) {
      const pa = (p/5)*Math.PI*2;
      ctx.fillStyle = petalColors[p%3];
      ctx.beginPath(); ctx.ellipse(fx+Math.cos(pa)*5, fy-borderH*0.15+Math.sin(pa)*5, 4, 2.5, pa, 0, Math.PI*2); ctx.fill();
    }
    // Center
    ctx.fillStyle = '#f0d060';
    ctx.beginPath(); ctx.arc(fx, fy-borderH*0.15, 3, 0, Math.PI*2); ctx.fill();
    // Small accent between flowers
    ctx.fillStyle = '#8a5a6a';
    ctx.beginPath(); ctx.arc(fx + flowerSpacing*0.5, fy, 2, 0, Math.PI*2); ctx.fill();
  }
  // Border trim lines
  ctx.strokeStyle = '#a07868'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,borderY); ctx.lineTo(W,borderY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,borderY+borderH); ctx.lineTo(W,borderY+borderH); ctx.stroke();
  ctx.restore();

  // ── WINDOW ───────────────────────────────────────────────────────
  const wx = W*0.52, wy = H*0.10, ww = W*0.30, wh = H*0.36;
  WIN.x = wx; WIN.y = wy; WIN.w = ww; WIN.h = wh;

  // Window recess sill
  ctx.fillStyle = '#c8b898';
  ctx.fillRect(wx-8, wy-8, ww+16, wh+16);
  ctx.fillStyle = '#b8a888';
  ctx.beginPath(); ctx.moveTo(wx-8,wy-8); ctx.lineTo(wx+ww+8,wy-8); ctx.lineTo(wx+ww,wy); ctx.lineTo(wx,wy); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a89878';
  ctx.beginPath(); ctx.moveTo(wx-8,wy-8); ctx.lineTo(wx,wy); ctx.lineTo(wx,wy+wh); ctx.lineTo(wx-8,wy+wh+8); ctx.closePath(); ctx.fill();

  if (!WIN.broken) {
    const skyG = ctx.createLinearGradient(wx, wy, wx, wy+wh);
    skyG.addColorStop(0, '#7abce8'); skyG.addColorStop(1, '#b8ddf0');
    ctx.fillStyle = skyG; ctx.fillRect(wx, wy, ww, wh);
    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    [[wx+ww*0.2,wy+wh*0.18,18],[wx+ww*0.6,wy+wh*0.12,14],[wx+ww*0.75,wy+wh*0.3,11]].forEach(([cx,cy,r])=>{
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+r*.7,cy,r*.65,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-r*.6,cy,r*.6,0,Math.PI*2); ctx.fill();
    });
    // Glass sheen
    const glG = ctx.createLinearGradient(wx,wy,wx+ww,wy+wh);
    glG.addColorStop(0,'rgba(255,255,255,0.15)'); glG.addColorStop(0.5,'rgba(255,255,255,0)'); glG.addColorStop(1,'rgba(255,255,255,0.05)');
    ctx.fillStyle = glG; ctx.fillRect(wx,wy,ww,wh);
  } else {
    ctx.fillStyle = '#0e0c08'; ctx.fillRect(wx,wy,ww,wh);
    if (!WIN.crackLines) {
      WIN.crackLines = [];
      const cx2=wx+ww/2, cy2=wy+wh/2;
      for (let i=0;i<12;i++) {
        const a=(i/12)*Math.PI*2+0.1, r1=ww*0.1, r2=ww*(0.28+Math.random()*0.3);
        WIN.crackLines.push([cx2,cy2, cx2+Math.cos(a)*r1+(Math.random()-.5)*8, cy2+Math.sin(a)*r1+(Math.random()-.5)*8, cx2+Math.cos(a)*r2, cy2+Math.sin(a)*r2]);
      }
    }
    ctx.strokeStyle='rgba(180,220,255,0.5)'; ctx.lineWidth=1.5;
    for (const [x1,y1,x2,y2,x3,y3] of WIN.crackLines) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke(); }
  }
  // White painted window frame — very 90s
  ctx.strokeStyle = '#e8e0d0'; ctx.lineWidth = 7;
  ctx.strokeRect(wx, wy, ww, wh);
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(wx+ww*0.5,wy); ctx.lineTo(wx+ww*0.5,wy+wh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx,wy+wh*0.48); ctx.lineTo(wx+ww,wy+wh*0.48); ctx.stroke();

  // Poufy window valance — very 90s!
  ctx.fillStyle = '#b05868';
  for (let v=0; v<3; v++) {
    const vx2 = wx + (v/3)*ww;
    const vw = ww/3;
    ctx.beginPath();
    ctx.moveTo(vx2, wy-2);
    ctx.quadraticCurveTo(vx2+vw*0.5, wy+H*0.04, vx2+vw, wy-2);
    ctx.lineTo(vx2+vw, wy-8); ctx.lineTo(vx2, wy-8);
    ctx.closePath(); ctx.fill();
    // Fringe dots
    ctx.fillStyle = '#d4a0a8';
    for (let fd=0; fd<5; fd++) {
      const fvx = vx2 + (fd/4)*vw;
      const fvy = wy + H*0.012 + Math.sin((fd/4)*Math.PI)*H*0.022;
      ctx.beginPath(); ctx.arc(fvx, fvy, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#b05868';
  }
  // Valance rod
  ctx.fillStyle = '#c8a050';
  ctx.fillRect(wx-10, wy-10, ww+20, 8);

  // ── HONEY OAK CABINETS (left wall, 90s style) ────────────────────
  const cabX=0, cabY=H*0.08, cabW=W*0.28, cabH=H*0.42;
  const cabDepth=W*0.022;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(cabX+cabW,cabY+4,6,cabH);

  // Cabinet body — honey oak gradient
  const oakG = ctx.createLinearGradient(cabX,cabY,cabX+cabW,cabY);
  oakG.addColorStop(0,   '#d4942a');
  oakG.addColorStop(0.3, '#e8a838');
  oakG.addColorStop(0.6, '#c88420');
  oakG.addColorStop(1,   '#b87018');
  ctx.fillStyle = oakG; ctx.fillRect(cabX,cabY,cabW,cabH);

  // Oak grain lines
  ctx.save();
  ctx.strokeStyle='rgba(150,80,0,0.12)'; ctx.lineWidth=1;
  for (let g=0;g<8;g++) {
    const gx = cabX + (g/7)*cabW;
    ctx.beginPath(); ctx.moveTo(gx+(Math.sin(g)*3),cabY); ctx.lineTo(gx-(Math.sin(g)*2),cabY+cabH); ctx.stroke();
  }
  ctx.restore();

  // Top 3D face
  ctx.fillStyle='#f0b840';
  ctx.beginPath(); ctx.moveTo(cabX,cabY); ctx.lineTo(cabX+cabW,cabY); ctx.lineTo(cabX+cabW+cabDepth,cabY-cabDepth*.5); ctx.lineTo(cabX+cabDepth,cabY-cabDepth*.5); ctx.closePath(); ctx.fill();
  // Right side face
  ctx.fillStyle='#9a6010';
  ctx.beginPath(); ctx.moveTo(cabX+cabW,cabY); ctx.lineTo(cabX+cabW+cabDepth,cabY-cabDepth*.5); ctx.lineTo(cabX+cabW+cabDepth,cabY+cabH-cabDepth*.5); ctx.lineTo(cabX+cabW,cabY+cabH); ctx.closePath(); ctx.fill();

  // Door panels — beveled oak style
  const panels=[
    [W*0.02,H*0.10,W*0.11,H*0.14],[W*0.15,H*0.10,W*0.11,H*0.14],
    [W*0.02,H*0.27,W*0.11,H*0.12],[W*0.15,H*0.27,W*0.11,H*0.12],
    [W*0.02,H*0.41,W*0.11,H*0.07],[W*0.15,H*0.41,W*0.11,H*0.07],
  ];
  for (const [px,py,pw,ph2] of panels) {
    // Inset shadow
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(px+2,py+2,pw,ph2);
    // Panel fill
    const panG=ctx.createLinearGradient(px,py,px+pw,py);
    panG.addColorStop(0,'#cc8818'); panG.addColorStop(0.5,'#e09a28'); panG.addColorStop(1,'#b87018');
    ctx.fillStyle=panG; ctx.fillRect(px,py,pw,ph2);
    // Bevel — light top/left
    ctx.fillStyle='rgba(255,200,80,0.25)'; ctx.fillRect(px,py,pw,3); ctx.fillRect(px,py,3,ph2);
    // Bevel — dark bottom/right
    ctx.fillStyle='rgba(80,40,0,0.2)'; ctx.fillRect(px,py+ph2-3,pw,3); ctx.fillRect(px+pw-3,py,3,ph2);
  }
  // White ceramic knobs — very 90s!
  for (const [xi,yi] of [[W*0.075,H*0.165],[W*0.205,H*0.165],[W*0.075,H*0.33],[W*0.205,H*0.33],[W*0.075,H*0.445],[W*0.205,H*0.445]]) {
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(xi+2,yi+2,6,0,Math.PI*2); ctx.fill();
    const kg=ctx.createRadialGradient(xi-2,yi-2,1,xi,yi,7);
    kg.addColorStop(0,'#ffffff'); kg.addColorStop(0.6,'#e8e8e8'); kg.addColorStop(1,'#c0c0c0');
    ctx.fillStyle=kg; ctx.beginPath(); ctx.arc(xi,yi,6,0,Math.PI*2); ctx.fill();
  }

  // ── GRANITE COUNTERTOPS (speckled, very 90s) ─────────────────────
  const ctY = horizon - H*0.06;
  const ctH = H*0.055;
  const ctDepth = H*0.032;

  function drawGraniteCounter(x, w2) {
    // Top face — solid granite colour, no random speckle each frame
    const topG = ctx.createLinearGradient(x, ctY-ctDepth, x+w2, ctY);
    topG.addColorStop(0,   '#c0b8a8');
    topG.addColorStop(0.4, '#d4ccc0');
    topG.addColorStop(1,   '#a8a090');
    ctx.fillStyle = topG;
    ctx.beginPath();
    ctx.moveTo(x,ctY); ctx.lineTo(x+w2,ctY);
    ctx.lineTo(x+w2+ctDepth*.5, ctY-ctDepth);
    ctx.lineTo(x+ctDepth*.5, ctY-ctDepth);
    ctx.closePath(); ctx.fill();
    // Front face — solid gradient
    const ctG = ctx.createLinearGradient(x, ctY, x, ctY+ctH);
    ctG.addColorStop(0, '#a8a098'); ctG.addColorStop(1, '#888078');
    ctx.fillStyle = ctG; ctx.fillRect(x, ctY, w2, ctH);
    // Top edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, ctY); ctx.lineTo(x+w2, ctY); ctx.stroke();
    // Shadow under counter
    const shG = ctx.createLinearGradient(x, ctY+ctH, x, ctY+ctH+8);
    shG.addColorStop(0,'rgba(0,0,0,0.18)'); shG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = shG; ctx.fillRect(x, ctY+ctH, w2, 8);
  }

  drawGraniteCounter(0, W*0.5);
  drawGraniteCounter(W*0.56, W*0.44);

  // ── UPPER SHELF — oak ────────────────────────────────────────────
  const shX=W*0.68, shY=H*0.44, shW=W*0.32, shD=H*0.018;
  const shOakG=ctx.createLinearGradient(shX,shY-shD,shX,shY);
  shOakG.addColorStop(0,'#e8a838'); shOakG.addColorStop(1,'#c88420');
  ctx.fillStyle=shOakG;
  ctx.beginPath(); ctx.moveTo(shX,shY); ctx.lineTo(shX+shW,shY); ctx.lineTo(shX+shW,shY-shD); ctx.lineTo(shX,shY-shD); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#9a6010'; ctx.fillRect(shX,shY,shW,H*0.018);
  const shSh=ctx.createLinearGradient(shX,shY+H*0.018,shX,shY+H*0.042);
  shSh.addColorStop(0,'rgba(0,0,0,0.18)'); shSh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shSh; ctx.fillRect(shX,shY+H*0.018,shW,H*0.026);

  // ── HUNTER GREEN ACCENT TILES (backsplash) ───────────────────────
  // Between counter and cabinets — classic 90s green tile backsplash
  const bsY = cabY + cabH;
  const bsH = ctY - bsY;
  if (bsH > 0) {
    const tileW = W*0.045, tileH = H*0.038;
    for (let ty=bsY; ty<bsY+bsH; ty+=tileH) {
      for (let tx=0; tx<cabW; tx+=tileW) {
        const tileG=ctx.createLinearGradient(tx,ty,tx+tileW,ty+tileH);
        tileG.addColorStop(0,'#3a6a3a'); tileG.addColorStop(0.5,'#4a8a4a'); tileG.addColorStop(1,'#2a5a2a');
        ctx.fillStyle=tileG; ctx.fillRect(tx+1,ty+1,tileW-2,tileH-2);
        ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=0.5;
        ctx.strokeRect(tx,ty,tileW,tileH);
      }
    }
  }

  // ── CHECKERED BLACK & WHITE FLOOR ────────────────────────────────
  const floorY = horizon;
  const tileSize = W * 0.12;
  const cols2 = Math.ceil(W / tileSize) + 2;

  // Base floor colour
  ctx.fillStyle='#d8d4c8'; ctx.fillRect(0,floorY,W,H-floorY);

  // Perspective checkered tiles converging to VP
  ctx.save();
  const steps2 = 10;
  for (let row=0; row<steps2; row++) {
    const t0 = Math.pow(row/steps2, 1.6);
    const t1 = Math.pow((row+1)/steps2, 1.6);
    const y0 = floorY + (H-floorY)*t0;
    const y1 = floorY + (H-floorY)*t1;
    const rowWidth0 = W * (0.3 + t0*0.7);
    const rowWidth1 = W * (0.3 + t1*0.7);
    const numTiles = Math.max(2, Math.floor(4 + row*1.2));
    for (let col=0; col<numTiles; col++) {
      const x0 = W/2 - rowWidth0/2 + (col/numTiles)*rowWidth0;
      const x1 = W/2 - rowWidth0/2 + ((col+1)/numTiles)*rowWidth0;
      const x2 = W/2 - rowWidth1/2 + ((col+1)/numTiles)*rowWidth1;
      const x3 = W/2 - rowWidth1/2 + (col/numTiles)*rowWidth1;
      const isBlack = (row + col) % 2 === 0;
      ctx.fillStyle = isBlack ? '#2a2a2a' : '#e8e4d8';
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y0); ctx.lineTo(x2,y1); ctx.lineTo(x3,y1); ctx.closePath(); ctx.fill();
    }
  }
  // Floor sheen
  const fSheen=ctx.createLinearGradient(0,floorY,0,floorY+H*0.08);
  fSheen.addColorStop(0,'rgba(255,250,240,0.15)'); fSheen.addColorStop(1,'rgba(255,250,240,0)');
  ctx.fillStyle=fSheen; ctx.fillRect(0,floorY,W,H*0.08);
  ctx.restore();

  // ── CROWN MOLDING / CORNICE ───────────────────────────────────────
  const cornG=ctx.createLinearGradient(0,0,0,H*0.05);
  cornG.addColorStop(0,'#e8e0d0'); cornG.addColorStop(1,'#d0c8b8');
  ctx.fillStyle=cornG; ctx.fillRect(0,0,W,H*0.05);
  ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.fillRect(0,H*0.048,W,4);

  // ── BASEBOARD ────────────────────────────────────────────────────
  ctx.fillStyle='#e0d8c8'; ctx.fillRect(0,horizon-H*0.018,W,H*0.018);
  ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,horizon-H*0.018,W,2);

  // ── WINDOW LIGHT ON FLOOR ─────────────────────────────────────────
  if (!WIN.broken) {
    ctx.save();
    const lx=WIN.x+WIN.w*0.5;
    const lG=ctx.createRadialGradient(lx,horizon,5,lx,H*0.85,W*0.5);
    lG.addColorStop(0,'rgba(255,245,210,0.2)'); lG.addColorStop(0.5,'rgba(255,240,200,0.08)'); lG.addColorStop(1,'rgba(255,240,200,0)');
    ctx.fillStyle=lG; ctx.fillRect(0,horizon,W,H-horizon);
    ctx.restore();
  }

  // ── AMBIENT OCCLUSION at wall/floor join ─────────────────────────
  const aoG=ctx.createLinearGradient(0,horizon-10,0,horizon+12);
  aoG.addColorStop(0,'rgba(0,0,0,0)'); aoG.addColorStop(1,'rgba(0,0,0,0.2)');
  ctx.fillStyle=aoG; ctx.fillRect(0,horizon-10,W,22);
}


function drawItem(item) {
  const ph = item.phys;
  let x, y, w, h;
  if (ph) {
    w = ph.w; h = ph.h;
    x = ph.px - w/2; y = ph.py - h/2;
  } else {
    x = item.x*W; y = item.y*H; w = item.w*W; h = item.h*H;
  }
  const cx = x + w/2, cy = y + h/2;

  ctx.save();
  if (ph) {
    ctx.translate(ph.px, ph.py);
    ctx.rotate(ph.angle);
    ctx.translate(-ph.px, -ph.py);
  }
  if (item.hit && !ph) ctx.globalAlpha = 0.55;

  const sd = w * 0.12; // side depth for 3D face

  switch (item.type) {

    case 'jar': {
      // Front face
      const jg = ctx.createLinearGradient(x, y, x+w, y);
      jg.addColorStop(0,   item.hit ? '#444' : '#3a6a2a');
      jg.addColorStop(0.4, item.hit ? '#666' : '#5a9a3a');
      jg.addColorStop(1,   item.hit ? '#333' : '#2a5020');
      ctx.fillStyle = jg; ctx.fillRect(x, y+h*0.12, w, h*0.88);
      // Glass label area
      if (!item.hit) {
        ctx.fillStyle = 'rgba(180,220,160,0.5)';
        ctx.fillRect(x+w*0.1, y+h*0.2, w*0.8, h*0.5);
        ctx.fillStyle = '#5a3010'; ctx.font = `bold ${Math.floor(h*0.22)}px Georgia`;
        ctx.textAlign = 'center'; ctx.fillText('JAR', cx, y+h*0.52);
      }
      // Metal lid — top face
      const lidG = ctx.createLinearGradient(x, y, x+w, y+h*0.14);
      lidG.addColorStop(0,'#d0a040'); lidG.addColorStop(0.5,'#f0c860'); lidG.addColorStop(1,'#a07020');
      ctx.fillStyle = lidG; ctx.fillRect(x-2, y, w+4, h*0.14);
      // Lid top shine
      ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(x, y, w, h*0.05);
      // Side shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(x+w-sd*0.5, y+h*0.12, sd*0.5, h*0.88);
      break;
    }

    case 'plate': {
      // Shadow under plate
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(cx, y+h+3, w*0.45, h*0.25, 0, 0, Math.PI*2); ctx.fill();
      // Plate body — ellipse (seen slightly from above)
      const pg = ctx.createRadialGradient(cx-w*0.1, cy-h*0.1, w*0.05, cx, cy, w*0.55);
      pg.addColorStop(0, item.hit ? '#ccc' : '#f4eedd');
      pg.addColorStop(0.7, item.hit ? '#aaa' : '#e0d0b0');
      pg.addColorStop(1,   item.hit ? '#888' : '#c8b888');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.ellipse(cx, cy, w*0.5, h*0.48, 0, 0, Math.PI*2); ctx.fill();
      // Inner ring
      ctx.strokeStyle = item.hit ? '#999' : '#c8b070'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(cx, cy, w*0.3, h*0.28, 0, 0, Math.PI*2); ctx.stroke();
      // Rim highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(cx-w*0.05, cy-h*0.05, w*0.42, h*0.4, -0.3, Math.PI*1.1, Math.PI*1.6); ctx.stroke();
      if (item.hit) {
        ctx.strokeStyle = 'rgba(100,80,60,0.7)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(cx-w*0.1, cy-h*0.4); ctx.lineTo(cx+w*0.05, cy+h*0.45); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+w*0.2, cy-h*0.3); ctx.lineTo(cx-w*0.1, cy+h*0.4); ctx.stroke();
      }
      break;
    }

    case 'mug': {
      const mug_c = item.hit ? '#666' : '#3a5a8a';
      // Side face
      ctx.fillStyle = item.hit ? '#444' : '#2a4070';
      ctx.fillRect(x+w*0.8, y+h*0.12, sd*0.7, h*0.88);
      // Front face gradient
      const mg = ctx.createLinearGradient(x, y, x+w, y);
      mg.addColorStop(0,   item.hit ? '#555' : '#2c4878');
      mg.addColorStop(0.3, item.hit ? '#888' : '#4a6aaa');
      mg.addColorStop(1,   item.hit ? '#555' : '#2a4070');
      ctx.fillStyle = mg; ctx.fillRect(x, y+h*0.12, w*0.82, h*0.88);
      // Rim (top) ellipse
      const rimG = ctx.createLinearGradient(x, y+h*0.08, x, y+h*0.18);
      rimG.addColorStop(0,'#6a8aaa'); rimG.addColorStop(1,'#3a5a8a');
      ctx.fillStyle = rimG;
      ctx.beginPath(); ctx.ellipse(x+w*0.41, y+h*0.12, w*0.41, h*0.1, 0, 0, Math.PI*2); ctx.fill();
      // Handle
      ctx.strokeStyle = item.hit ? '#555' : '#2a4070'; ctx.lineWidth = h*0.1;
      ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.arc(x+w*0.9, y+h*0.45, h*0.22, -0.6, Math.PI*0.6); ctx.stroke();
      // Coffee surface
      if (!item.hit) {
        ctx.fillStyle = '#3a1800';
        ctx.beginPath(); ctx.ellipse(x+w*0.41, y+h*0.12, w*0.36, h*0.08, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,200,150,0.15)';
        ctx.beginPath(); ctx.ellipse(x+w*0.35, y+h*0.1, w*0.12, h*0.04, -0.3, 0, Math.PI*2); ctx.fill();
      }
      break;
    }

    case 'pot': {
      // Side face (darker)
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(x+w*0.88, y+h*0.2, sd*0.7, h*0.8);
      // Body gradient
      const potG = ctx.createLinearGradient(x, y, x+w, y);
      potG.addColorStop(0,   item.hit ? '#666' : '#303030');
      potG.addColorStop(0.35,item.hit ? '#999' : '#505050');
      potG.addColorStop(1,   item.hit ? '#555' : '#252525');
      ctx.fillStyle = potG; ctx.fillRect(x+w*0.04, y+h*0.22, w*0.84, h*0.78);
      // Handles (sides)
      ctx.fillStyle = '#404040';
      ctx.fillRect(x-w*0.04, y+h*0.28, w*0.1, h*0.12);
      ctx.fillRect(x+w*0.94, y+h*0.28, w*0.1, h*0.12);
      // Lid
      const lidPG = ctx.createLinearGradient(x, y+h*0.12, x, y+h*0.22);
      lidPG.addColorStop(0, '#505050'); lidPG.addColorStop(1,'#2a2a2a');
      ctx.fillStyle = lidPG; ctx.fillRect(x+w*0.08, y+h*0.12, w*0.84, h*0.12);
      // Lid knob
      ctx.fillStyle = '#606060';
      ctx.beginPath(); ctx.arc(cx, y+h*0.12, w*0.07, 0, Math.PI*2); ctx.fill();
      // Rim highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x+w*0.04, y+h*0.22); ctx.lineTo(x+w*0.88, y+h*0.22); ctx.stroke();
      break;
    }

    case 'bowl': {
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(cx, y+h+2, w*0.45, h*0.2, 0, 0, Math.PI*2); ctx.fill();
      // Bowl body
      const bowlG = ctx.createRadialGradient(cx-w*0.1, cy, w*0.1, cx, cy, w*0.55);
      bowlG.addColorStop(0, item.hit ? '#bbb' : '#e09060');
      bowlG.addColorStop(1, item.hit ? '#888' : '#b06030');
      ctx.fillStyle = bowlG;
      ctx.beginPath(); ctx.ellipse(cx, y+h*0.65, w*0.5, h*0.45, 0, 0, Math.PI); ctx.fill();
      // Rim (top ellipse)
      ctx.fillStyle = item.hit ? '#aaa' : '#d4824a';
      ctx.beginPath(); ctx.ellipse(cx, y+h*0.18, w*0.5, h*0.2, 0, 0, Math.PI*2); ctx.fill();
      // Inner rim dark
      ctx.fillStyle = item.hit ? '#888' : '#a06030';
      ctx.beginPath(); ctx.ellipse(cx, y+h*0.18, w*0.38, h*0.13, 0, 0, Math.PI*2); ctx.fill();
      // Fruit
      if (!item.hit) {
        ctx.font = `${Math.floor(w*0.32)}px serif`; ctx.textAlign = 'center';
        ctx.fillText('🍋', cx-w*0.18, y+h*0.28);
        ctx.fillText('🍊', cx+w*0.12, y+h*0.22);
      }
      break;
    }

    case 'toaster': {
      // Side face
      ctx.fillStyle = '#888060'; ctx.fillRect(x+w, y+h*0.28, sd*0.6, h*0.72);
      // Top face
      const tTopG = ctx.createLinearGradient(x, y+h*0.1, x, y+h*0.3);
      tTopG.addColorStop(0,'#e0d090'); tTopG.addColorStop(1,'#b8a860');
      ctx.fillStyle = tTopG; ctx.fillRect(x, y+h*0.1, w+sd*0.3, h*0.2);
      // Body
      const tG = ctx.createLinearGradient(x, y, x+w, y);
      tG.addColorStop(0,   item.hit ? '#777' : '#b0a070');
      tG.addColorStop(0.4, item.hit ? '#aaa' : '#d8c890');
      tG.addColorStop(1,   item.hit ? '#666' : '#989060');
      ctx.fillStyle = tG; ctx.fillRect(x, y+h*0.28, w, h*0.72);
      // Slots
      ctx.fillStyle = '#1a1a12';
      ctx.fillRect(x+w*0.18, y+h*0.06, w*0.26, h*0.26);
      ctx.fillRect(x+w*0.52, y+h*0.06, w*0.26, h*0.26);
      // Slot highlight
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
      ctx.strokeRect(x+w*0.18, y+h*0.06, w*0.26, h*0.26);
      ctx.strokeRect(x+w*0.52, y+h*0.06, w*0.26, h*0.26);
      // Lever
      ctx.fillStyle = '#606050'; ctx.fillRect(x+w*0.85, y+h*0.45, w*0.08, h*0.35);
      ctx.fillStyle = '#404030'; ctx.fillRect(x+w*0.83, y+h*0.6, w*0.12, h*0.08);
      break;
    }

    case 'clock': {
      const r = Math.min(w, h) * 0.46;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(cx+4, cy+4, r, r, 0, 0, Math.PI*2); ctx.fill();
      // Clock frame
      const frameG = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r*1.1);
      frameG.addColorStop(0, item.hit ? '#aaa' : '#c8a858');
      frameG.addColorStop(0.7,item.hit ? '#888' : '#a07830');
      frameG.addColorStop(1,  item.hit ? '#666' : '#7a5820');
      ctx.fillStyle = frameG;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      // Clock face
      const faceG = ctx.createRadialGradient(cx-r*0.2, cy-r*0.2, r*0.05, cx, cy, r*0.85);
      faceG.addColorStop(0, item.hit ? '#ddd' : '#f8f0d8');
      faceG.addColorStop(1, item.hit ? '#bbb' : '#e0cca0');
      ctx.fillStyle = faceG;
      ctx.beginPath(); ctx.arc(cx, cy, r*0.82, 0, Math.PI*2); ctx.fill();
      // Hour markers
      if (!item.hit) {
        ctx.fillStyle = '#5a3a10';
        for (let i = 0; i < 12; i++) {
          const a = (i/12)*Math.PI*2 - Math.PI/2;
          const mr = r*0.7; const ml = i%3===0 ? r*0.12 : r*0.07;
          ctx.fillRect(cx + Math.cos(a)*mr - 1.5, cy + Math.sin(a)*mr - ml/2, 3, ml);
        }
        // Hands
        ctx.strokeStyle = '#2a1a08'; ctx.lineCap = 'round';
        ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+Math.cos(-1.2)*r*0.5, cy+Math.sin(-1.2)*r*0.5); ctx.stroke();
        ctx.lineWidth = 1.8; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+Math.cos(0.8)*r*0.68, cy+Math.sin(0.8)*r*0.68); ctx.stroke();
        ctx.fillStyle = '#c03010'; ctx.beginPath(); ctx.arc(cx, cy, r*0.06, 0, Math.PI*2); ctx.fill();
      }
      // Glass sheen
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath(); ctx.arc(cx-r*0.15, cy-r*0.2, r*0.55, Math.PI*1.15, Math.PI*1.75); ctx.fill();
      break;
    }

    case 'plant': {
      // Pot — side face
      ctx.fillStyle = '#6a3810'; ctx.fillRect(x+w*0.7, y+h*0.55, sd*0.5, h*0.45);
      // Pot body
      const potPlG = ctx.createLinearGradient(x+w*0.2, y, x+w*0.8, y);
      potPlG.addColorStop(0,'#5a2808'); potPlG.addColorStop(0.4,'#8a4820'); potPlG.addColorStop(1,'#5a2808');
      ctx.fillStyle = potPlG;
      ctx.beginPath();
      ctx.moveTo(x+w*0.18, y+h*0.58); ctx.lineTo(x+w*0.25, y+h); ctx.lineTo(x+w*0.75, y+h); ctx.lineTo(x+w*0.82, y+h*0.58);
      ctx.closePath(); ctx.fill();
      // Pot rim
      ctx.fillStyle = '#a06030';
      ctx.beginPath(); ctx.ellipse(cx, y+h*0.58, w*0.34, h*0.1, 0, 0, Math.PI*2); ctx.fill();
      // Soil
      ctx.fillStyle = '#3a2010';
      ctx.beginPath(); ctx.ellipse(cx, y+h*0.58, w*0.28, h*0.08, 0, 0, Math.PI*2); ctx.fill();
      if (!item.hit) {
        // Leaves with gradient
        const leafColors = ['#2a7a2a','#3a9a2a','#1a6a1a'];
        const leafPos = [[cx, y+h*0.35, w*0.38],[cx-w*0.22, y+h*0.48, w*0.26],[cx+w*0.22, y+h*0.46, w*0.26]];
        leafPos.forEach(([lx,ly,lr],i) => {
          const lg = ctx.createRadialGradient(lx-lr*0.2, ly-lr*0.2, lr*0.1, lx, ly, lr*0.5);
          lg.addColorStop(0, '#4aaa2a'); lg.addColorStop(1, leafColors[i]);
          ctx.fillStyle = lg;
          ctx.beginPath(); ctx.arc(lx, ly, lr*0.5, 0, Math.PI*2); ctx.fill();
        });
      } else {
        ctx.fillStyle = '#6a7a3a'; ctx.fillRect(x, y+h*0.3, w, h*0.28);
      }
      break;
    }
  }
  ctx.restore();
}

function drawFan() {
  const cx = W * 0.5, cy = H * 0.10;
  const bladeSpan = W * 0.36;

  // Drop shadow on ceiling
  const shadowG = ctx.createRadialGradient(cx, cy+10, 5, cx, cy+10, bladeSpan*0.9);
  shadowG.addColorStop(0,   'rgba(0,0,0,0.22)');
  shadowG.addColorStop(0.4, 'rgba(0,0,0,0.1)');
  shadowG.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = shadowG;
  ctx.beginPath(); ctx.ellipse(cx, cy+14, bladeSpan*0.85, bladeSpan*0.18, 0, 0, Math.PI*2); ctx.fill();

  // Downrod
  const rodG = ctx.createLinearGradient(cx-6, 0, cx+6, 0);
  rodG.addColorStop(0,'#7a5a28'); rodG.addColorStop(0.4,'#c8a040'); rodG.addColorStop(1,'#5a3a10');
  ctx.fillStyle = rodG; ctx.fillRect(cx - 5, 0, 10, cy - 14);

  // Canopy
  const canG = ctx.createRadialGradient(cx-8, 4, 2, cx, 8, 28);
  canG.addColorStop(0,'#e0b040'); canG.addColorStop(1,'#7a5020');
  ctx.fillStyle = canG;
  ctx.beginPath(); ctx.ellipse(cx, 8, 24, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 1.5; ctx.stroke();

  // Motor housing back circle (shadow face)
  ctx.fillStyle = '#2a1808';
  ctx.beginPath(); ctx.ellipse(cx+3, cy+3, 26, 17, 0, 0, Math.PI*2); ctx.fill();

  // Fan blades with 3D perspective
  for (let i = 0; i < 4; i++) {
    const a = fanAngle + i * Math.PI / 2;
    const cosA = Math.cos(a), sinA = Math.sin(a);
    const extend = cosA;
    const thickness = Math.abs(sinA) * 12 + 2;
    if (Math.abs(extend) < 0.04) continue;
    const tipX = cx + extend * bladeSpan;
    const tipY = cy + sinA * 10;
    const hw = 12, tw = Math.max(2, 7 * Math.abs(extend));

    ctx.save();
    // Blade shadow offset
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(cx + (extend > 0 ? hw : -hw) + 3, cy - thickness/2 + 5);
    ctx.lineTo(tipX + 3, tipY - tw/2 + 5);
    ctx.lineTo(tipX + 3, tipY + tw/2 + 5);
    ctx.lineTo(cx + (extend > 0 ? hw : -hw) + 3, cy + thickness/2 + 5);
    ctx.closePath(); ctx.fill();

    // Blade face with wood-grain gradient
    const bladeG = ctx.createLinearGradient(cx, cy-thickness/2, tipX, tipY);
    const light = Math.floor(155 + cosA * 40);
    bladeG.addColorStop(0,   `rgba(${light+20},${Math.floor((light+20)*0.75)},${Math.floor((light+20)*0.28)},1)`);
    bladeG.addColorStop(0.5, `rgba(${light},${Math.floor(light*0.72)},${Math.floor(light*0.25)},1)`);
    bladeG.addColorStop(1,   `rgba(${light-30},${Math.floor((light-30)*0.7)},${Math.floor((light-30)*0.22)},1)`);
    ctx.fillStyle = bladeG;
    ctx.beginPath();
    ctx.moveTo(cx + (extend > 0 ? hw : -hw), cy - thickness/2);
    ctx.lineTo(tipX, tipY - tw/2);
    ctx.lineTo(tipX, tipY + tw/2);
    ctx.lineTo(cx + (extend > 0 ? hw : -hw), cy + thickness/2);
    ctx.closePath(); ctx.fill();

    // Edge stroke
    ctx.strokeStyle = 'rgba(80,50,10,0.5)'; ctx.lineWidth = 1;
    ctx.stroke();

    // Wood grain lines
    for (let g = 1; g <= 2; g++) {
      ctx.strokeStyle = `rgba(0,0,0,${0.08 * g})`;
      ctx.lineWidth = 0.8;
      const t = g / 3;
      ctx.beginPath();
      ctx.moveTo(cx + (extend>0?hw:-hw), cy - thickness/2 + thickness*t);
      ctx.lineTo(tipX*(0.96)+cx*0.04, tipY - tw/2 + tw*t);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Motor housing front (layered for depth)
  const mhG = ctx.createRadialGradient(cx-6, cy-5, 3, cx, cy, 26);
  mhG.addColorStop(0,   '#8a6030');
  mhG.addColorStop(0.5, '#5a3818');
  mhG.addColorStop(1,   '#2a1408');
  ctx.fillStyle = mhG;
  ctx.beginPath(); ctx.ellipse(cx, cy, 24, 16, 0, 0, Math.PI*2); ctx.fill();
  // Inner ring
  const innerG = ctx.createRadialGradient(cx-4, cy-4, 2, cx, cy, 14);
  innerG.addColorStop(0,'#c8a040'); innerG.addColorStop(1,'#7a5020');
  ctx.fillStyle = innerG;
  ctx.beginPath(); ctx.ellipse(cx, cy, 13, 9, 0, 0, Math.PI*2); ctx.fill();
  // Center bolt
  ctx.fillStyle = '#e0c050';
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0d860';
  ctx.beginPath(); ctx.arc(cx-1.5, cy-1.5, 2.5, 0, Math.PI*2); ctx.fill();
}

function drawForeground() {
  // Thin ledge at the very bottom — just enough to frame the throw zone
  const fgY = H * 0.86;
  const ledgeH = H * 0.015; // thin top surface strip

  // Counter top surface — just a narrow strip
  const fgGrad = ctx.createLinearGradient(0, fgY, 0, fgY + ledgeH);
  fgGrad.addColorStop(0, '#c8a050');
  fgGrad.addColorStop(1, '#a07830');
  ctx.fillStyle = fgGrad;
  ctx.fillRect(0, fgY, W, ledgeH);

  // Top edge highlight
  ctx.strokeStyle = 'rgba(255,230,150,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, fgY); ctx.lineTo(W, fgY); ctx.stroke();
}

function drawJar(cx, cy, r, angle) {
  // A glass jar of stewed tomatoes, upright but rotated with spin
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  const jw = r * 1.1;   // jar half-width
  const jh = r * 1.6;   // jar half-height
  const lidH = r * 0.28;

  // Jar shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(2, jh+3, jw*0.7, r*0.18, 0, 0, Math.PI*2); ctx.fill();

  // Glass body — slightly tapered rectangle with rounded bottom
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(-jw, -jh + lidH);
  ctx.lineTo(-jw*0.9, jh);
  ctx.quadraticCurveTo(0, jh*1.08, jw*0.9, jh);
  ctx.lineTo(jw, -jh + lidH);
  ctx.closePath();
  // Glass fill — tinted red-orange for tomato contents
  const glassG = ctx.createLinearGradient(-jw, 0, jw, 0);
  glassG.addColorStop(0,   'rgba(180,60,30,0.85)');
  glassG.addColorStop(0.35,'rgba(210,80,40,0.9)');
  glassG.addColorStop(0.65,'rgba(200,70,35,0.85)');
  glassG.addColorStop(1,   'rgba(150,40,20,0.9)');
  ctx.fillStyle = glassG;
  ctx.fill();

  // Tomato chunks visible inside
  ctx.fillStyle = 'rgba(255,120,60,0.55)';
  ctx.beginPath(); ctx.ellipse(-jw*0.3, jh*0.2, jw*0.22, r*0.18, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(jw*0.2, jh*0.45, jw*0.18, r*0.15, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-jw*0.1, jh*0.6, jw*0.14, r*0.12, 0.5, 0, Math.PI*2); ctx.fill();

  // Glass highlight (left sheen)
  const sheenG = ctx.createLinearGradient(-jw, -jh, -jw*0.2, jh);
  sheenG.addColorStop(0,   'rgba(255,255,255,0.35)');
  sheenG.addColorStop(0.4, 'rgba(255,255,255,0.15)');
  sheenG.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = sheenG;
  ctx.fill(); // re-uses same path still clipped
  ctx.restore();

  // Label — cream coloured paper wrap
  ctx.fillStyle = '#f0e8c8';
  ctx.fillRect(-jw*0.88, -jh*0.35, jw*1.76, jh*0.72);
  // Label border
  ctx.strokeStyle = '#c8a040'; ctx.lineWidth = 1;
  ctx.strokeRect(-jw*0.88, -jh*0.35, jw*1.76, jh*0.72);
  // Label text "STEWED"
  ctx.fillStyle = '#8a2010';
  ctx.font = `bold ${r*0.32}px Georgia`;
  ctx.textAlign = 'center';
  ctx.fillText('STEWED', 0, -jh*0.08);
  // Label text "TOMATOES"
  ctx.font = `bold ${r*0.26}px Georgia`;
  ctx.fillText('TOMATOES', 0, jh*0.15);
  // Small tomato icon on label
  ctx.font = `${r*0.3}px serif`;
  ctx.fillText('🍅', 0, jh*0.36);

  // Jar lid — flat metal cap
  const lidG = ctx.createLinearGradient(-jw, -jh, jw, -jh+lidH);
  lidG.addColorStop(0,   '#a0b850');
  lidG.addColorStop(0.3, '#c8d870');
  lidG.addColorStop(0.6, '#90a840');
  lidG.addColorStop(1,   '#708030');
  ctx.fillStyle = lidG;
  ctx.beginPath();
  ctx.moveTo(-jw*1.05, -jh+lidH);
  ctx.lineTo(jw*1.05, -jh+lidH);
  ctx.lineTo(jw, -jh);
  ctx.lineTo(-jw, -jh);
  ctx.closePath(); ctx.fill();
  // Lid top cap
  ctx.fillStyle = '#b0c860';
  ctx.beginPath(); ctx.ellipse(0, -jh, jw, lidH*0.35, 0, 0, Math.PI*2); ctx.fill();
  // Lid ring detail
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(0, -jh+lidH*0.5, jw*1.02, lidH*0.15, 0, 0, Math.PI*2); ctx.stroke();

  // Outline
  ctx.strokeStyle = 'rgba(80,30,10,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-jw, -jh + lidH);
  ctx.lineTo(-jw*0.9, jh);
  ctx.quadraticCurveTo(0, jh*1.08, jw*0.9, jh);
  ctx.lineTo(jw, -jh + lidH);
  ctx.stroke();

  ctx.restore();
}

function drawProjectile(p) {
  ctx.save();
  if (p.type === 'potato') {
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    // Potato body
    const potG = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, p.r*0.1, 0, 0, p.r*1.4);
    potG.addColorStop(0, '#c8a040');
    potG.addColorStop(0.5,'#8B6914');
    potG.addColorStop(1, '#5a3f08');
    ctx.fillStyle = potG;
    ctx.beginPath(); ctx.ellipse(0, 0, p.r*1.3, p.r, 0.3, 0, Math.PI*2); ctx.fill();
    // Eyes/divots
    ctx.fillStyle = '#5a3f08';
    ctx.beginPath(); ctx.ellipse(-p.r*0.35, -p.r*0.2, p.r*0.12, p.r*0.09, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(p.r*0.2, p.r*0.25, p.r*0.1, p.r*0.08, 0.4, 0, Math.PI*2); ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,220,120,0.25)';
    ctx.beginPath(); ctx.ellipse(-p.r*0.2, -p.r*0.3, p.r*0.5, p.r*0.3, -0.4, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.restore();
    drawJar(p.x, p.y, p.r, p.angle);
    return;
  }
  ctx.restore();
}

function drawDebris() {
  for (let d of debris) {
    ctx.save(); ctx.globalAlpha = d.life;
    ctx.translate(d.x, d.y); ctx.rotate(d.angle);
    if (d.isTomato) { ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(0, 0, d.r, 0, Math.PI*2); ctx.fill(); }
    else { ctx.fillStyle = '#8B6914'; ctx.beginPath(); ctx.ellipse(0, 0, d.r*1.2, d.r*0.8, 0, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  }
}

function drawHitEffects() {
  for (let e of hitEffects) {
    ctx.save(); ctx.globalAlpha = e.life * 0.7;
    ctx.strokeStyle = e.isTomato ? '#e74c3c' : '#f0c060'; ctx.lineWidth = 3;
    const r = (1 - e.life) * 60;
    ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.stroke();
    if (e.isTomato) {
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + e.life*2, dr = r*1.3;
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.arc(e.x+Math.cos(a)*dr, e.y+Math.sin(a)*dr, 4*(1-e.life*0.5), 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
  }
}

function drawFloatingTexts() {
  for (let t of floatingTexts) {
    ctx.save(); ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color || '#f0c060';
    ctx.font = `bold ${t.size||20}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }
}

function drawKitchenDamage() {
  for (let d of kitchenDamage) {
    ctx.save(); ctx.globalAlpha = 0.7;
    if (d.isTomato) {
      ctx.fillStyle = '#8B1a1a';
      ctx.beginPath();
      for (let i = 0; i < d.pts.length; i++) i===0 ? ctx.moveTo(d.pts[i][0], d.pts[i][1]) : ctx.lineTo(d.pts[i][0], d.pts[i][1]);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = '#4a3010';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2a1a00'; ctx.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        const a = d.angle + i * Math.PI/2 + 0.3;
        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x + Math.cos(a)*d.r*1.5, d.y + Math.sin(a)*d.r*1.5); ctx.stroke();
      }
    }
    ctx.restore();
  }
}

// ─── PHYSICS ──────────────────────────────────────────────────────
function updateProjectile(p) {
  p.vx *= 0.995;
  p.vy += 0.25;
  p.x += p.vx;
  p.y += p.vy;
  p.angle += p.spin;

  // Fan collision
  const fcx = W*0.5, fcy = H*0.10;
  const bladeSpan = W * 0.36;
  for (let i = 0; i < 4; i++) {
    const ba = fanAngle + i * Math.PI/2;
    const cosA = Math.cos(ba);
    if (Math.abs(cosA) < 0.15) continue;
    const tipX = fcx + cosA * bladeSpan;
    const tipY = fcy + Math.sin(ba) * 8;
    for (let s = 1; s <= 6; s++) {
      const t = s/6;
      const bx = fcx + (tipX-fcx)*t, by = fcy + (tipY-fcy)*t;
      const dx = p.x - bx, dy = p.y - by;
      if (Math.sqrt(dx*dx+dy*dy) < p.r + 9) {
        // Give it a strong random kick off the blade — this is where the damage comes from
        const inSpd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        const outSpd = Math.max(inSpd, 14) * 1.6; // always leave fast regardless of entry speed
        const deflectAngle = Math.atan2(p.vy, p.vx) + (Math.random()-0.5) * 1.2 + Math.PI * 0.4;
        p.vx = Math.cos(deflectAngle) * outSpd * (cosA > 0 ? 1 : -1) * (0.8 + Math.random()*0.5);
        p.vy = -Math.abs(Math.sin(deflectAngle) * outSpd) - 4; // always fling upward/across
        p.spin = cosA * (0.5 + Math.random()*0.5);
        fanSpeed = Math.min(0.09, fanSpeed + 0.02);
        playFanHit();
        spawnHit(p.x, p.y, p.type==='tomato');
        p.hitFan = true;
        return false;
      }
    }
  }
  const dist = Math.sqrt((p.x-fcx)**2 + (p.y-fcy)**2);
  if (dist < 24 + p.r) {
    p.vx *= -0.8; p.vy = -Math.abs(p.vy)*0.7;
    playFanHit();
    spawnHit(p.x, p.y, p.type==='tomato');
    p.hitFan = true; // now it can hit things
  }

  // Only remove if way off screen before fan hit
  if (!p.hitFan) {
    if (p.y < -150 || p.x < -300 || p.x > W+300) return true;
    // Still allow cabinet hits before fan (they're on the way)
    if (p.x > CABINET_ZONE.x * W && p.x < CABINET_ZONE.w * W &&
        p.y > CABINET_ZONE.y * H && p.y < (CABINET_ZONE.y + CABINET_ZONE.h) * H) {
      hitCabinet(p.x, p.y, p.type === 'tomato');
      p.vx = Math.abs(p.vx) * 0.5;
      p.vy *= 0.6;
      p.hitFan = true; // cabinet counts as "first hit" now
    }
    return false;
  }

  // Cabinet hit — left wall zone
  if (p.x > CABINET_ZONE.x * W && p.x < CABINET_ZONE.w * W &&
      p.y > CABINET_ZONE.y * H && p.y < (CABINET_ZONE.y + CABINET_ZONE.h) * H) {
    hitCabinet(p.x, p.y, p.type === 'tomato');
    // Bounce off cabinet face
    p.vx = Math.abs(p.vx) * 0.5; // always bounce rightward
    p.vy *= 0.6;
  }

  // Window hit
  if (!WIN.broken &&
      p.x > WIN.x && p.x < WIN.x + WIN.w &&
      p.y > WIN.y && p.y < WIN.y + WIN.h) {
    smashWindow(p.x, p.y);
    spawnHit(p.x, p.y, p.type==='tomato');
    addKitchenDamage(p.x, p.y, p.type==='tomato');
    const pts = p.type==='tomato' ? 45 : 15;
    score += pts;
    updateScoreDisplay();
    spawnFloatingText('+'+pts+' 💥 WINDOW!', p.x, p.y - 20, '#88ddff', 24);
    p.vx *= 0.3; p.vy *= 0.3;
  }

  // Kitchen item hits
  for (let item of kitchenItems) {
    if (item.hit) continue;
    const ix = item.x*W - 4, iy = item.y*H - 4, iw = item.w*W + 8, ih = item.h*H + 8;
    if (p.x > ix && p.x < ix+iw && p.y > iy && p.y < iy+ih) {
      item.hit = true;
      const pts = p.type==='tomato' ? item.pts*4 : item.pts;
      score += pts;
      updateScoreDisplay();
      spawnFloatingText('+'+pts+(p.type==='tomato'?' 🍅':''), p.x, p.y, p.type==='tomato'?'#e74c3c':'#f0c060');
      spawnHit(p.x, p.y, p.type==='tomato');
      addKitchenDamage(p.x, p.y, p.type==='tomato');
      if (p.type === 'tomato') { playTomatoSplat(p.x); }
      else if (item.sound === 'metal') playMetalBang(p.x);
      else if (item.sound === 'crash') playCrash(p.x);
      else playThud(p.x);
      knockItem(item, p.vx, p.vy);
      // Slow a bit but keep going — can hit multiple items after the fan
      p.vx *= 0.7;
      p.vy *= 0.7;
    }
  }

  // Wall/floor hits
  if (p.x < 5 || p.x > W-5) {
    if (p.type==='tomato') playTomatoSplat(p.x); else playCrash(p.x);
    addKitchenDamage(p.x, p.y, p.type==='tomato');
    spawnHit(p.x, p.y, p.type==='tomato');
    return true;
  }
  if (p.y > H * 0.78) {
    playFloorBounce(p.x);
    addKitchenDamage(p.x, p.y, p.type==='tomato');
    spawnHit(p.x, p.y, p.type==='tomato');
    return true;
  }
  if (p.y < -100 || p.x < -200 || p.x > W+200) return true;
  return false;
}

function spawnHit(x, y, isTomato) {
  hitEffects.push({ x, y, life:1, isTomato });
  const n = isTomato ? 8 : 5;
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, spd = 2+Math.random()*4;
    debris.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd-2, angle: Math.random()*Math.PI*2, spin: (Math.random()-0.5)*0.3, r: 3+Math.random()*5, life:1, isTomato });
  }
}

function spawnFloatingText(text, x, y, color, size) {
  floatingTexts.push({ text, x, y, vy:-1.5, life:1, color: color||'#f0c060', size: size||22 });
}

function addKitchenDamage(x, y, isTomato) {
  if (isTomato) {
    const pts = [];
    for (let i = 0; i < 7; i++) { const a=(i/7)*Math.PI*2, r=15+Math.random()*20; pts.push([x+Math.cos(a)*r, y+Math.sin(a)*r]); }
    kitchenDamage.push({ isTomato:true, pts });
  } else {
    kitchenDamage.push({ isTomato:false, x, y, r: 8+Math.random()*8, angle: Math.random()*Math.PI*2 });
  }
}

// ─── INPUT ────────────────────────────────────────────────────────
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameActive) return;
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY, cx: t.clientX, cy: t.clientY };
  unlockAudio();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameActive || !touchStart) return;
  const t = e.touches[0];
  touchStart.cx = t.clientX;
  touchStart.cy = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!gameActive || !touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if (dist < 10 || dy > -15) { touchStart = null; return; }
  throwItem(touchStart.x, touchStart.y, dx, dy);
  touchStart = null;
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  if (!gameActive) return;
  touchStart = { x: e.clientX, y: e.clientY, cx: e.clientX, cy: e.clientY };
  unlockAudio();
});
canvas.addEventListener('mousemove', e => {
  if (!gameActive || !touchStart) return;
  touchStart.cx = e.clientX;
  touchStart.cy = e.clientY;
});
canvas.addEventListener('mouseup', e => {
  if (!gameActive || !touchStart) return;
  const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
  if (Math.sqrt(dx*dx+dy*dy) < 10 || dy > -10) { touchStart = null; return; }
  throwItem(touchStart.x, touchStart.y, dx, dy);
  touchStart = null;
});

function drawThrowPreview() {
  if (!touchStart || !gameActive) return;
  const sx = touchStart.x, sy = touchStart.y;
  const dx = touchStart.cx - sx, dy = touchStart.cy - sy;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const isTomato = selectedItem === 'tomato';
  const r = isTomato ? 18 : 20;

  // Glow ring — own save/restore so it never bleeds into jar drawing
  ctx.save();
  ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.008) * 0.2;
  ctx.strokeStyle = isTomato ? '#ff6060' : '#f0c840';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(sx, sy, r + 8, 0, Math.PI*2); ctx.stroke();
  ctx.restore(); // always restore before drawing item

  // The item itself — fresh context state
  if (isTomato) {
    drawJar(sx, sy, r, 0);
  } else {
    ctx.save();
    ctx.fillStyle = '#8B6914';
    ctx.beginPath(); ctx.ellipse(sx, sy, r*1.3, r, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a5510'; ctx.fillRect(sx-3, sy-2, 6, 4);
    ctx.restore();
  }

  // Arc preview dots if swiping upward
  if (dist > 15 && dy < 0) {
    const len = Math.sqrt(dx*dx+dy*dy);
    const speed = Math.min(len * 0.18, 22);
    const vx = (dx/len)*speed, vy = (dy/len)*speed;
    ctx.save();
    ctx.fillStyle = isTomato ? 'rgba(220,80,80,0.5)' : 'rgba(200,160,60,0.5)';
    let px = sx, py = sy, pvx = vx, pvy = vy;
    for (let i = 0; i < 18; i++) {
      pvx *= 0.995; pvy += 0.25;
      px += pvx; py += pvy;
      if (py > H * 0.78) break;
      const dotR = Math.max(1.5, (r * 0.35) * (1 - i/18));
      ctx.globalAlpha = 0.6 * (1 - i/18);
      ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function throwItem(sx, sy, dx, dy) {
  if (selectedItem==='potato' && potatoes<=0) return;
  if (selectedItem==='tomato' && tomatoes<=0) return;
  const len = Math.sqrt(dx*dx+dy*dy);
  const speed = Math.min(len * 0.18, 22);
  const vx = (dx/len)*speed, vy = (dy/len)*speed;
  const isTomato = selectedItem==='tomato';
  projectiles.push({
    x:sx, y:sy, vx, vy,
    angle: Math.atan2(vy,vx),
    spin:(Math.random()-0.5)*0.2,
    r: isTomato ? 18 : 20,          // potato is now bigger
    type: selectedItem,
    hitFan: false
  });
  if (isTomato) { tomatoes--; speak('Stewed tomatoes!', ['Daniel', 'Arthur', 'en-GB', 'British']); }
  else { potatoes--; speakPotatoCall(); }
  updateAmmoDisplay();
  document.getElementById('hint').style.opacity = '0';
  if (potatoes<=0 && tomatoes<=0) setTimeout(endGame, 2500);
}

function selectItem(type) {
  selectedItem = type;
  touchStart = null; // cancel any in-progress throw gesture
  document.getElementById('btn-potato').classList.toggle('active', type==='potato');
  document.getElementById('btn-tomato').classList.toggle('active', type==='tomato');
}

// Wire item buttons with touchstart so selection fires before canvas touchstart
(function() {
  function wireBtn(id, type) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', function(e) {
      e.stopPropagation(); // don't let it reach canvas
      e.preventDefault();
      selectItem(type);
      unlockAudio();
    }, { passive: false });
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      selectItem(type);
    });
  }
  wireBtn('btn-potato', 'potato');
  wireBtn('btn-tomato', 'tomato');
})();

// ─── UI ───────────────────────────────────────────────────────────
function updateScoreDisplay() {
  document.getElementById('score-display').textContent = score;
  // 100pt milestone cue
  if (!milestoneSpoken && score >= 100) {
    milestoneSpoken = true;
    setTimeout(() => speak("Somebody's doing well!", ['Samantha','Alex','en-US','Nathan']), 300);
  }
}

function updateAmmoDisplay() {
  const ab = document.getElementById('ammo-block');
  ab.innerHTML = '';
  const pr = document.createElement('div'); pr.className='ammo-row';
  for (let i=0; i<POTATO_COUNT; i++) { const p=document.createElement('div'); p.className='ammo-pip '+(i<potatoes?'pip-potato':'pip-used'); pr.appendChild(p); }
  ab.appendChild(pr);
  const tr = document.createElement('div'); tr.className='ammo-row';
  for (let i=0; i<TOMATO_COUNT; i++) { const p=document.createElement('div'); p.className='ammo-pip '+(i<tomatoes?'pip-tomato':'pip-used'); tr.appendChild(p); }
  ab.appendChild(tr);
  document.getElementById('btn-potato').classList.toggle('empty', potatoes<=0);
  document.getElementById('btn-tomato').classList.toggle('empty', tomatoes<=0);
  if (potatoes<=0 && selectedItem==='potato' && tomatoes>0) selectItem('tomato');
}

// ─── GAME LOOP ────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  lastTime = ts;
  ctx.clearRect(0, 0, W, H);
  drawKitchen();
  for (let item of kitchenItems) drawItem(item);
  drawCabinetDamage();
  drawKitchenDamage();
  drawFan();
  drawHitEffects();
  drawGlassShards();
  drawDebris();
  for (let p of projectiles) drawProjectile(p);
  drawFloatingTexts();
  drawForeground();
  drawThrowPreview();

  fanAngle += fanSpeed;
  // Drift back toward dial target speed
  fanSpeed += (fanSpeedTarget - fanSpeed) * 0.02;
  fanSpeed = Math.max(fanSpeedTarget * 0.5, fanSpeed);
  projectiles = projectiles.filter(p => !updateProjectile(p));
  updatePhysicsItems();
  updateGlassShards();

  for (let d of debris) { d.x+=d.vx; d.y+=d.vy; d.vy+=0.15; d.vx*=0.98; d.angle+=d.spin; d.life-=0.015; }
  debris = debris.filter(d => d.life > 0);
  for (let e of hitEffects) e.life -= 0.04;
  hitEffects = hitEffects.filter(e => e.life > 0);
  for (let t of floatingTexts) { t.y += t.vy; t.life -= 0.02; }
  floatingTexts = floatingTexts.filter(t => t.life > 0);
}
requestAnimationFrame(loop);

function startGame() {

  selectedItem = 'potato'; projectiles = []; debris = []; floatingTexts = [];

function endGame() {

}

function showNameEntry() {

async function saveScore() {

async function showLeaderboard() {

  const el = document.getElementById('lb-list');

  el.innerHTML = lb.map((e,i) => {
    const date = new Date(e.created_at).toLocaleDateString();

      <span class="lb-rank">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</span>

  }).join('');
}
